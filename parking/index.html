<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🚗 Smart Parking System | FIFO Queue | No Duplicate Cars</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .ui-container {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: flex-end;
        }

        .control-panel {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 18px 24px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.25);
            width: 300px;
        }

        .panel-title {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
            color: #ffd966;
        }

        .fifo-badge {
            background: #28a745;
            color: white;
            text-align: center;
            padding: 5px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .no-duplicate-badge {
            background: #dc3545;
            color: white;
            text-align: center;
            padding: 4px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-bottom: 10px;
            font-weight: bold;
        }

        button {
            background: #2c7da0;
            border: none;
            color: white;
            padding: 10px 18px;
            margin: 6px 0;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-size: 1rem;
        }

        button:hover {
            background: #1f5e7a;
            transform: scale(1.02);
        }

        .mode-toggle {
            background: #6c757d;
        }

        .status-cards {
            display: flex;
            gap: 12px;
            margin: 12px 0;
        }

        .card {
            background: rgba(0,0,0,0.65);
            border-radius: 18px;
            padding: 10px;
            text-align: center;
            flex: 1;
            color: white;
            font-weight: bold;
        }

        .card span {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .list-section {
            margin-top: 12px;
        }

        .section-title {
            font-weight: bold;
            font-size: 0.85rem;
            margin: 8px 0 5px;
            color: #ffecb3;
        }

        .parking-list, .waiting-list {
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
            padding: 6px;
            max-height: 130px;
            overflow-y: auto;
            font-size: 0.8rem;
        }

        .list-item {
            padding: 6px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            font-family: monospace;
            color: white;
            display: flex;
            justify-content: space-between;
        }

        .exit-next {
            background: #ff6b35;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
        }

        .sms-alert {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #dc3545;
            color: white;
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: bold;
            z-index: 30;
            transition: opacity 0.4s;
            pointer-events: none;
            font-family: monospace;
        }

        @media (max-width: 700px) {
            .control-panel { width: 260px; padding: 12px 16px; }
        }
    </style>
</head>
<body>

    <div class="ui-container">
        <div class="control-panel">
            <div class="panel-title">🚗 SMART PARKING</div>
            <div class="fifo-badge">🎯 FIFO MODE: First In, First Out</div>
            <div class="no-duplicate-badge">⛔ NO DUPLICATE CAR NUMBERS ALLOWED</div>
            <button id="entryBtn">🚙 CAR ENTRY</button>
            <button id="exitBtn">🚪 CAR EXIT</button>
            <button id="modeToggleBtn" class="mode-toggle">🌙 NIGHT MODE</button>
            
            <div class="status-cards">
                <div class="card">🅿️ PARKING<br><span id="parkCount">0</span>/<span id="maxPark">3</span></div>
                <div class="card">⏳ WAITING<br><span id="waitCount">0</span>/<span id="maxWait">10</span></div>
            </div>
            
            <div class="list-section">
                <div class="section-title">🚘 PARKED CARS (FIFO Order)</div>
                <div id="parkedListDisplay" class="parking-list">— Empty —</div>
            </div>
            <div class="list-section">
                <div class="section-title">⏱️ WAITING QUEUE</div>
                <div id="waitingListDisplay" class="waiting-list">— No waiting —</div>
            </div>
        </div>
    </div>
    <div id="smsAlert" class="sms-alert" style="display: none;">📱 SMS: </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';
        
        // ========== FIFO QUEUE SYSTEM ==========
        const MAX_PARK = 3;
        const MAX_WAIT = 10;
        let parking = [];     // FIFO queue
        let waiting = [];     // FIFO queue
        
        // Animation state
        let isAnimating = false;
        let activeCarObj = null;
        let animationStartPos = null;
        let animationTargetPos = null;
        let animationProgress = 0;
        let onCompleteCallback = null;
        
        // DOM Elements
        const parkedDiv = document.getElementById('parkedListDisplay');
        const waitingDiv = document.getElementById('waitingListDisplay');
        
        // Helper function to check if car number already exists (in parking OR waiting)
        function isCarNumberExists(carNumber) {
            const normalizedNumber = carNumber.trim().toUpperCase();
            // Check in parking array
            if (parking.includes(normalizedNumber)) {
                return true;
            }
            // Check in waiting array
            if (waiting.includes(normalizedNumber)) {
                return true;
            }
            return false;
        }
        
        function updateUI() {
            document.getElementById('parkCount').innerText = parking.length;
            document.getElementById('waitCount').innerText = waiting.length;
            
            if (parking.length === 0) {
                parkedDiv.innerHTML = '<div style="padding:6px;">— Empty —</div>';
            } else {
                let html = '';
                for (let i = 0; i < parking.length; i++) {
                    const isFirst = (i === 0);
                    html += `<div class="list-item">
                                <span>🚘 ${parking[i]}</span>
                                ${isFirst ? '<span class="exit-next">NEXT TO EXIT</span>' : ''}
                            </div>`;
                }
                parkedDiv.innerHTML = html;
            }
            
            if (waiting.length === 0) {
                waitingDiv.innerHTML = '<div style="padding:6px;">— No waiting —</div>';
            } else {
                let html = '';
                for (let i = 0; i < waiting.length; i++) {
                    const isFirst = (i === 0);
                    html += `<div class="list-item">
                                <span>⏳ ${waiting[i]}</span>
                                ${isFirst ? '<span style="color:#ffaa44;">⏩ NEXT TO ENTER</span>' : ''}
                            </div>`;
                }
                waitingDiv.innerHTML = html;
            }
        }
        
        function playHornSound() {
            try {
                let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = 950;
                gain.gain.setValueAtTime(0.4, now);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.6);
                osc.start();
                osc.stop(now + 0.55);
            } catch(e) { console.log("audio err"); }
        }
        
        function showSMS(msg, isError = true) {
            const smsDiv = document.getElementById('smsAlert');
            smsDiv.style.display = 'block';
            smsDiv.style.background = isError ? '#dc3545' : '#28a745';
            smsDiv.innerHTML = `📱 SMS: ${msg}`;
            smsDiv.style.opacity = '1';
            setTimeout(() => {
                smsDiv.style.opacity = '0';
                setTimeout(() => { 
                    smsDiv.style.display = 'none'; 
                    smsDiv.style.opacity = '1';
                    smsDiv.style.background = '#dc3545';
                }, 500);
            }, 3000);
        }
        
        // ========== 3D SCENE ==========
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5.5, 3.8, 7);
        camera.lookAt(0, 0.2, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0.5, 0);
        
        const ambientLight = new THREE.AmbientLight(0x404060, 0.65);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xfff5e0, 1.2);
        dirLight.position.set(5, 8, 3);
        dirLight.castShadow = true;
        scene.add(dirLight);
        const fillLight = new THREE.PointLight(0x6688aa, 0.3);
        fillLight.position.set(1, 2, 2);
        scene.add(fillLight);
        
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x2a3a2a });
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(12, 12), groundMat);
        ground.rotation.x = -Math.PI/2;
        ground.position.y = -0.2;
        ground.receiveShadow = true;
        scene.add(ground);
        
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x2c2e3a });
        const road = new THREE.Mesh(new THREE.PlaneGeometry(3.5, 8), roadMat);
        road.rotation.x = -Math.PI/2;
        road.position.set(0, -0.18, -1.2);
        road.receiveShadow = true;
        scene.add(road);
        
        const slotPositions = [
            { x: -1.9, z: 1.4, index: 0 },
            { x: 0, z: 1.4, index: 1 },
            { x: 1.9, z: 1.4, index: 2 }
        ];
        
        slotPositions.forEach(slot => {
            const marker = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.05, 1.9), 
                new THREE.MeshStandardMaterial({ color: 0x3a6a8a, transparent: true, opacity: 0.5 }));
            marker.position.set(slot.x, -0.16, slot.z);
            marker.receiveShadow = true;
            scene.add(marker);
            
            const edges = new THREE.EdgesGeometry(new THREE.BoxGeometry(1.2, 0.05, 1.9));
            const wire = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffaa77 }));
            wire.position.copy(marker.position);
            scene.add(wire);
        });
        
        let parkedCarMeshes = [null, null, null];
        
        function createCarModel(colorHex, posX, posZ) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.85, 0.32, 1.25), 
                new THREE.MeshStandardMaterial({ color: colorHex, metalness: 0.7 }));
            body.position.y = 0.16;
            body.castShadow = true;
            group.add(body);
            
            const roof = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.22, 0.85), 
                new THREE.MeshStandardMaterial({ color: 0x2c2c2c }));
            roof.position.y = 0.42;
            roof.castShadow = true;
            group.add(roof);
            
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
            const wheelPos = [[-0.55, 0.07, -0.58], [0.55, 0.07, -0.58], [-0.55, 0.07, 0.58], [0.55, 0.07, 0.58]];
            wheelPos.forEach(pos => {
                const wheel = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.16, 0.1, 20), wheelMat);
                wheel.rotation.z = Math.PI/2;
                wheel.position.set(pos[0], pos[1], pos[2]);
                wheel.castShadow = true;
                group.add(wheel);
            });
            group.position.set(posX, -0.05, posZ);
            group.rotation.y = Math.PI/2;
            return group;
        }
        
        function updateParking3D() {
            for (let i = 0; i < parkedCarMeshes.length; i++) {
                if (parkedCarMeshes[i]) {
                    scene.remove(parkedCarMeshes[i]);
                    parkedCarMeshes[i] = null;
                }
            }
            for (let i = 0; i < parking.length && i < MAX_PARK; i++) {
                const slot = slotPositions[i];
                let hue = (parking[i].length * 41 + (parking[i].charCodeAt(0) || 120)) % 360;
                const carColor = new THREE.Color(`hsl(${hue}, 75%, 58%)`);
                const carModel = createCarModel(carColor.getHex(), slot.x, slot.z);
                scene.add(carModel);
                parkedCarMeshes[i] = carModel;
            }
        }
        
        const entryPoint = new THREE.Vector3(-0.5, -0.05, -2.8);
        const exitPoint = new THREE.Vector3(0.5, -0.05, -3.2);
        
        function getSlotPosition(slotIndex) {
            const slot = slotPositions[slotIndex];
            return new THREE.Vector3(slot.x, -0.05, slot.z);
        }
        
        function animateCarMovement(startVec, endVec, carColorHex, onFinish) {
            if (isAnimating) {
                console.error("Animation already in progress");
                return false;
            }
            isAnimating = true;
            const tempCar = createCarModel(carColorHex, startVec.x, startVec.z);
            scene.add(tempCar);
            activeCarObj = tempCar;
            animationStartPos = startVec.clone();
            animationTargetPos = endVec.clone();
            animationProgress = 0;
            onCompleteCallback = onFinish;
            return true;
        }
        
        // ========== CAR ENTRY with Duplicate Check ==========
        function carEntry() {
            if (isAnimating) {
                alert("Please wait, another car is moving...");
                return;
            }
            
            const carNumber = prompt("Enter Car Number (e.g., ABC-1234):");
            if (!carNumber || carNumber.trim() === "") return;
            
            const trimmed = carNumber.trim().toUpperCase();
            
            // CHECK FOR DUPLICATE CAR NUMBER
            if (isCarNumberExists(trimmed)) {
                playHornSound();
                const msg = `❌ DUPLICATE! Car ${trimmed} already exists in system!`;
                showSMS(msg, true);
                alert(msg);
                return;
            }
            
            if (parking.length >= MAX_PARK) {
                if (waiting.length >= MAX_WAIT) {
                    playHornSound();
                    const msg = `SYSTEM FULL! Car ${trimmed} rejected.`;
                    showSMS(msg, true);
                    alert(msg);
                    return;
                } else {
                    waiting.push(trimmed);
                    updateUI();
                    const msg = `Parking Full! ${trimmed} added to waiting queue (Position: ${waiting.length})`;
                    showSMS(msg, false);
                    alert(msg);
                    return;
                }
            }
            
            const targetSlotIdx = parking.length;
            const targetPos = getSlotPosition(targetSlotIdx);
            const carColor = new THREE.Color(`hsl(${(trimmed.length * 73) % 360}, 75%, 58%)`);
            
            animateCarMovement(entryPoint, targetPos, carColor.getHex(), () => {
                scene.remove(activeCarObj);
                activeCarObj = null;
                parking.push(trimmed);
                updateParking3D();
                updateUI();
                const msg = `✅ ${trimmed} parked at slot ${targetSlotIdx + 1}`;
                showSMS(msg, false);
                alert(`Car ${trimmed} entered and parked.`);
                isAnimating = false;
            });
        }
        
        // ========== CAR EXIT ==========
        function carExit() {
            if (isAnimating) {
                alert("Please wait, another car is moving...");
                return;
            }
            if (parking.length === 0) {
                alert("Parking is empty!");
                return;
            }
            
            const exitingCar = parking[0];
            const startPos = getSlotPosition(0);
            const carColor = new THREE.Color(`hsl(${(exitingCar.length * 73) % 360}, 75%, 58%)`);
            
            parking.shift();
            
            if (parkedCarMeshes[0]) {
                scene.remove(parkedCarMeshes[0]);
                parkedCarMeshes[0] = null;
            }
            
            updateUI();
            
            animateCarMovement(startPos, exitPoint, carColor.getHex(), () => {
                scene.remove(activeCarObj);
                activeCarObj = null;
                const msg = `🚪 ${exitingCar} exited (FIFO)`;
                showSMS(msg, false);
                alert(`Car ${exitingCar} exited.`);
                
                updateParking3D();
                
                setTimeout(() => {
                    if (waiting.length > 0) {
                        const nextCar = waiting[0];
                        waiting.shift();
                        updateUI();
                        
                        const newSlotIdx = parking.length;
                        const targetPos = getSlotPosition(newSlotIdx);
                        const newColor = new THREE.Color(`hsl(${(nextCar.length * 73) % 360}, 75%, 58%)`);
                        
                        isAnimating = false;
                        
                        animateCarMovement(entryPoint, targetPos, newColor.getHex(), () => {
                            scene.remove(activeCarObj);
                            activeCarObj = null;
                            parking.push(nextCar);
                            updateParking3D();
                            updateUI();
                            const parkMsg = `🚗 ${nextCar} moved from waiting to parking slot ${newSlotIdx + 1}`;
                            showSMS(parkMsg, false);
                            alert(`Waiting car ${nextCar} has been automatically parked.`);
                            isAnimating = false;
                        });
                    } else {
                        isAnimating = false;
                    }
                }, 50);
            });
        }
        
        // ========== DAY/NIGHT MODE ==========
        let isNight = false;
        const lampLights = [];
        
        function addLampPost(x, z) {
            const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.2, 1.4), 
                new THREE.MeshStandardMaterial({ color: 0xaa9988 }));
            pole.position.set(x, 0.5, z);
            pole.castShadow = true;
            scene.add(pole);
            
            const lampSphere = new THREE.Mesh(new THREE.SphereGeometry(0.2), 
                new THREE.MeshStandardMaterial({ color: 0xffdd99, emissive: 0xffaa66 }));
            lampSphere.position.set(x, 1.2, z);
            scene.add(lampSphere);
            
            const pLight = new THREE.PointLight(0xffaa66, 0);
            pLight.position.set(x, 1.0, z);
            pLight.distance = 6;
            scene.add(pLight);
            lampLights.push(pLight);
        }
        
        addLampPost(-2.2, -1.2);
        addLampPost(2.2, -1.2);
        addLampPost(0, 2.5);
        
        function addTree(x, z) {
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.3, 0.7), 
                new THREE.MeshStandardMaterial({ color: 0x8B5A2B }));
            trunk.position.set(x, -0.15, z);
            trunk.castShadow = true;
            const foliage = new THREE.Mesh(new THREE.ConeGeometry(0.45, 0.8, 8), 
                new THREE.MeshStandardMaterial({ color: 0x5a9e4e }));
            foliage.position.set(x, 0.25, z);
            foliage.castShadow = true;
            scene.add(trunk, foliage);
        }
        addTree(-2.8, -1.8);
        addTree(2.9, -1.9);
        addTree(-2.5, 2.5);
        addTree(2.6, 2.6);
        
        const sunMesh = new THREE.Mesh(new THREE.SphereGeometry(0.45, 32, 32), 
            new THREE.MeshStandardMaterial({ color: 0xffaa55, emissive: 0xff4400, emissiveIntensity: 0.8 }));
        sunMesh.position.set(3, 4.5, -4);
        scene.add(sunMesh);
        
        const moonMesh = new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 32), 
            new THREE.MeshStandardMaterial({ color: 0xccddff, emissive: 0x88aaff, emissiveIntensity: 0.3 }));
        moonMesh.position.set(3, 4.2, -4);
        moonMesh.visible = false;
        scene.add(moonMesh);
        
        const starGeometry = new THREE.BufferGeometry();
        const starPositions = new Float32Array(800 * 3);
        for (let i = 0; i < 800; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 400;
            starPositions[i*3+1] = (Math.random() - 0.5) * 100 + 20;
            starPositions[i*3+2] = (Math.random() - 0.5) * 100 - 80;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const stars = new THREE.Points(starGeometry, new THREE.PointsMaterial({ color: 0xffffff, size: 0.15 }));
        scene.add(stars);
        stars.visible = false;
        
        function setDayMode() {
            isNight = false;
            dirLight.intensity = 1.2;
            ambientLight.intensity = 0.65;
            scene.background = new THREE.Color(0xc8e4ff);
            lampLights.forEach(light => light.intensity = 0);
            sunMesh.visible = true;
            moonMesh.visible = false;
            stars.visible = false;
            scene.fog = null;
        }
        
        function setNightMode() {
            isNight = true;
            dirLight.intensity = 0.2;
            ambientLight.intensity = 0.28;
            scene.background = new THREE.Color(0x0a1030);
            lampLights.forEach(light => light.intensity = 0.9);
            sunMesh.visible = false;
            moonMesh.visible = true;
            stars.visible = true;
            scene.fog = new THREE.FogExp2(0x0a1030, 0.025);
        }
        
        setDayMode();
        
        function toggleDayNight() {
            if (isNight) setDayMode();
            else setNightMode();
            document.getElementById('modeToggleBtn').innerHTML = isNight ? "🌙 NIGHT MODE" : "☀️ DAY MODE";
        }
        
        function animate() {
            if (isAnimating && activeCarObj && animationStartPos && animationTargetPos) {
                animationProgress += 0.04;
                if (animationProgress >= 1) {
                    activeCarObj.position.copy(animationTargetPos);
                    if (onCompleteCallback) {
                        const callback = onCompleteCallback;
                        onCompleteCallback = null;
                        callback();
                    }
                } else {
                    const t = Math.sin(animationProgress * Math.PI/2);
                    const newX = animationStartPos.x + (animationTargetPos.x - animationStartPos.x) * t;
                    const newZ = animationStartPos.z + (animationTargetPos.z - animationStartPos.z) * t;
                    activeCarObj.position.set(newX, -0.05, newZ);
                }
            }
            controls.update();
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        document.getElementById('entryBtn').addEventListener('click', carEntry);
        document.getElementById('exitBtn').addEventListener('click', carExit);
        document.getElementById('modeToggleBtn').addEventListener('click', toggleDayNight);
        
        updateParking3D();
        updateUI();
        showSMS("✅ System Ready: No duplicate car numbers allowed! Waiting car auto-parks on exit.", false);
    </script>
</body>
</html>
