<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>CASIO CLASSWIZ | Scientific Calculator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* Light Mode Variables */
        :root {
            --bg-primary: linear-gradient(135deg, #0a1118 0%, #0c1420 100%);
            --bg-secondary: #0f1724;
            --bg-side: #0a101a;
            --bg-display: #01060c;
            --bg-card: #0c1620;
            --text-primary: #eef4ff;
            --text-secondary: #bbd4ff;
            --text-result: #f5d742;
            --border-color: #2a3f58;
            --button-bg: #16232e;
            --button-func: #1f3543;
            --button-sci: #0e2d3b;
            --button-op: #2a4058;
            --button-clear: #6a2e3a;
            --button-equal: #2a6d8f;
            --shadow: 0 2px 0 #03080f;
        }
        
        body.light {
            --bg-primary: linear-gradient(135deg, #e8f0ff 0%, #d4e0f0 100%);
            --bg-secondary: #ffffff;
            --bg-side: #f5f7fc;
            --bg-display: #f0f4fa;
            --bg-card: #e8edf5;
            --text-primary: #1a2a3a;
            --text-secondary: #2c4a6e;
            --text-result: #c97e00;
            --border-color: #c0d0e0;
            --button-bg: #e0e8f0;
            --button-func: #d0dce8;
            --button-sci: #c8d8e8;
            --button-op: #b8c8dc;
            --button-clear: #d4a0a8;
            --button-equal: #5a9ab8;
            --shadow: 0 2px 0 #b0c0d0;
        }
        
        body {
            background: var(--bg-primary);
            font-family: 'Segoe UI', 'Roboto', 'Fira Code', monospace;
            padding: 16px;
            min-height: 100vh;
            transition: all 0.3s ease;
        }
        
        .app-container { max-width: 1600px; margin: 0 auto; }
        
        /* Theme Toggle Button */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--button-bg);
            border: 1px solid var(--border-color);
            border-radius: 50px;
            padding: 10px 18px;
            cursor: pointer;
            font-size: 1rem;
            z-index: 1000;
            color: var(--text-primary);
            box-shadow: var(--shadow);
            transition: all 0.2s;
        }
        .theme-toggle:active { transform: scale(0.95); }
        
        .mode-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            margin-top: 10px;
            background: var(--bg-side);
            padding: 12px 16px;
            border-radius: 60px;
            border: 1px solid var(--border-color);
        }
        
        .mode-btn {
            background: var(--button-bg);
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            color: var(--text-secondary);
            font-size: 0.7rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s;
        }
        .mode-btn.active { background: var(--button-equal); color: white; box-shadow: 0 0 8px rgba(42,109,143,0.5); }
        .mode-btn:active { transform: scale(0.96); }
        
        .main-content { display: flex; gap: 20px; flex-wrap: wrap; }
        
        .calc-panel {
            flex: 2;
            min-width: 320px;
            background: var(--bg-secondary);
            border-radius: 32px;
            padding: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .side-panel {
            flex: 1.2;
            min-width: 300px;
            background: var(--bg-side);
            border-radius: 32px;
            padding: 20px;
            border: 1px solid var(--border-color);
            overflow-y: auto;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .history-section, .unit-section, .mode-section {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 16px;
        }
        
        .display-area {
            background: var(--bg-display);
            border-radius: 24px;
            padding: 18px;
            margin-bottom: 20px;
            box-shadow: inset 0 3px 8px rgba(0,0,0,0.1);
        }
        
        .current-expression {
            font-size: 1.3rem;
            font-family: 'Fira Code', monospace;
            color: var(--text-primary);
            word-break: break-all;
            min-height: 60px;
        }
        
        .result-row { display: flex; justify-content: space-between; align-items: baseline; margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border-color); }
        .result-value { font-size: 1.6rem; font-weight: 700; color: var(--text-result); font-family: monospace; word-break: break-word; }
        .error-msg { background: rgba(106,46,58,0.3); color: #ffaa99; font-size: 0.7rem; padding: 6px; border-radius: 20px; margin-top: 8px; text-align: center; }
        
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin-top: 12px;
        }
        
        button {
            background: var(--button-bg);
            border: none;
            padding: 12px 0;
            border-radius: 18px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary);
            cursor: pointer;
            transition: 0.05s linear;
            box-shadow: var(--shadow);
        }
        button:active { transform: translateY(2px); box-shadow: none; }
        
        .func-key { background: var(--button-func); font-size: 0.7rem; }
        .sci-key { background: var(--button-sci); color: var(--text-result); }
        .op-key { background: var(--button-op); color: var(--text-result); }
        .equal-key { background: var(--button-equal); color: white; }
        .clear-key { background: var(--button-clear); color: white; }
        .disabled-calc { opacity: 0.5; pointer-events: none; }
        
        .section-title { color: var(--text-result); font-size: 0.9rem; margin: 0 0 12px 0; font-weight: bold; border-left: 3px solid var(--text-result); padding-left: 12px; }
        
        .input-group { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
        .input-field, .select-field {
            background: var(--bg-display);
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: 14px;
            color: var(--text-primary);
            font-size: 0.75rem;
        }
        .input-field:focus { outline: none; border-color: var(--text-result); }
        .action-btn { background: var(--button-equal); padding: 8px 16px; border-radius: 24px; font-size: 0.75rem; font-weight: bold; cursor: pointer; border: none; color: white; }
        .action-btn:active { transform: scale(0.96); }
        
        .matrix-grid { display: inline-grid; gap: 8px; margin: 10px 0; background: var(--bg-card); padding: 12px; border-radius: 16px; }
        .matrix-input { width: 65px; text-align: center; background: var(--bg-display); border: 1px solid var(--border-color); padding: 6px; border-radius: 8px; color: var(--text-primary); }
        
        .data-item { background: var(--bg-card); padding: 12px; margin-top: 12px; border-radius: 16px; font-size: 0.8rem; color: var(--text-secondary); word-break: break-all; max-height: 200px; overflow-y: auto; }
        
        .history-list { max-height: 200px; overflow-y: auto; }
        .history-item { background: var(--bg-card); padding: 10px; margin-bottom: 8px; border-radius: 12px; cursor: pointer; border-left: 3px solid var(--text-result); }
        .history-item:hover { background: var(--button-bg); transform: translateX(3px); }
        .history-expr { color: var(--text-primary); font-size: 0.75rem; }
        .history-result { color: var(--text-result); font-size: 0.7rem; margin-top: 4px; }
        
        footer { font-size: 0.6rem; text-align: center; margin-top: 15px; color: var(--text-secondary); }
        .matrix-card { background: var(--bg-card); padding: 12px; border-radius: 16px; margin-bottom: 15px; }
        
        /* Mobile Responsive */
        @media (max-width: 900px) {
            body { padding: 12px; }
            .main-content { flex-direction: column; }
            .calc-panel { min-width: auto; }
            .side-panel { max-height: 60vh; }
            .buttons-grid { gap: 6px; }
            button { padding: 10px 0; font-size: 0.7rem; }
            .current-expression { font-size: 1rem; }
            .result-value { font-size: 1.3rem; }
            .mode-nav { gap: 6px; }
            .mode-btn { padding: 6px 12px; font-size: 0.6rem; }
            .matrix-input { width: 50px; font-size: 0.7rem; }
        }
        
        @media (max-width: 550px) {
            .buttons-grid { grid-template-columns: repeat(5, 1fr); }
            .theme-toggle { top: 10px; right: 10px; padding: 6px 12px; font-size: 0.8rem; }
            .section-title { font-size: 0.8rem; }
        }
        
        @media (max-width: 450px) {
            .buttons-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>
<button class="theme-toggle" id="themeToggle">🌙 Dark</button>

<div class="app-container">
    <div class="mode-nav">
        <button class="mode-btn active" data-mode="calc">🧮 Calculate</button>
        <button class="mode-btn" data-mode="matrix">📊 Matrix</button>
        <button class="mode-btn" data-mode="vector">➡️ Vector</button>
        <button class="mode-btn" data-mode="stats">📈 Statistics</button>
        <button class="mode-btn" data-mode="dist">📉 Distribution</button>
        <button class="mode-btn" data-mode="table">📋 Table</button>
        <button class="mode-btn" data-mode="equation">⚖️ Equation</button>
        <button class="mode-btn" data-mode="inequality">≷ Inequality</button>
        <button class="mode-btn" data-mode="ratio">🔁 Ratio</button>
        <button class="mode-btn" data-mode="complex">🔢 Complex</button>
        <button class="mode-btn" data-mode="base">💠 Base-N</button>
        <button class="mode-btn" data-mode="angle">📐 Angle</button>
        <button class="mode-btn" data-mode="eng">⚡ Engineer</button>
    </div>

    <div class="main-content">
        <div class="calc-panel" id="calcPanel">
            <div class="display-area">
                <div class="current-expression" id="currentExpr">0</div>
                <div class="result-row"><span class="result-value" id="resultValue">0</span></div>
                <div id="errorMsg" class="error-msg"></div>
            </div>
            <div class="buttons-grid" id="calcButtons">
                <button class="sci-key" data-func="sin">sin</button><button class="sci-key" data-func="cos">cos</button>
                <button class="sci-key" data-func="tan">tan</button><button class="sci-key" data-func="asin">sin⁻¹</button>
                <button class="sci-key" data-func="acos">cos⁻¹</button><button class="sci-key" data-func="atan">tan⁻¹</button>
                <button class="sci-key" data-func="sqrt">√</button><button class="sci-key" data-func="cbrt">∛</button>
                <button class="sci-key" data-func="ln">ln</button><button class="sci-key" data-func="log10">log₁₀</button>
                <button class="sci-key" data-func="abs">|x|</button><button class="func-key" data-func="pi">π</button>
                <button data-token="7">7</button><button data-token="8">8</button><button data-token="9">9</button>
                <button class="op-key" data-token="/">÷</button><button class="func-key" data-func="power">xʸ</button>
                <button class="func-key" data-func="frac">a⁄b</button>
                <button data-token="4">4</button><button data-token="5">5</button><button data-token="6">6</button>
                <button class="op-key" data-token="*">×</button><button class="func-key" data-func="left">(</button>
                <button class="func-key" data-func="right">)</button>
                <button data-token="1">1</button><button data-token="2">2</button><button data-token="3">3</button>
                <button class="op-key" data-token="-">−</button><button class="func-key" data-func="comma">,</button>
                <button class="func-key" data-func="e">e</button>
                <button data-token="0">0</button><button data-token=".">.</button><button class="func-key" data-func="neg">+/−</button>
                <button class="op-key" data-token="+">+</button><button class="clear-key" data-func="clear">AC</button>
                <button class="func-key" data-func="back">⌫</button>
                <button class="equal-key" data-func="eval" style="grid-column: span 2;">= EXE</button>
                <button class="func-key" data-func="space">SPACE</button><button class="func-key" data-func="help">❔</button>
            </div>
            <footer>▸ ^ for power | Only active in Calculate mode | Type directly in any field</footer>
        </div>

        <div class="side-panel">
            <div class="history-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                    <span class="section-title" style="margin:0">📜 HISTORY</span>
                    <button id="clearHistoryBtn" class="action-btn" style="background:var(--button-clear); padding:4px 12px;">Clear</button>
                </div>
                <div id="historyList" class="history-list">
                    <div style="color:var(--text-secondary); text-align:center; padding:20px;">No history yet<br>Click = to save</div>
                </div>
            </div>

            <div class="unit-section">
                <div class="section-title" style="margin-top:0">📐 UNIT CONVERTER</div>
                <div class="input-group"><select id="unitType" class="select-field"><option value="length">Length</option><option value="mass">Mass</option><option value="temperature">Temperature</option></select></div>
                <div class="input-group"><input type="number" id="unitValue" class="input-field" placeholder="Value" value="1" step="any"><select id="fromUnit" class="select-field"></select><span>→</span><select id="toUnit" class="select-field"></select><button id="doConvert" class="action-btn">Convert</button></div>
                <div id="unitResult" class="data-item" style="margin-top:8px">0</div>
            </div>

            <div class="mode-section" id="dynamicContent">
                <div class="section-title">📌 Current Mode</div>
                <div class="data-item">Select a mode from top bar</div>
            </div>
        </div>
    </div>
</div>

<script>
    // ========== THEME TOGGLE ==========
    const themeToggle = document.getElementById('themeToggle');
    let isDark = true;
    
    themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('light');
        isDark = !isDark;
        themeToggle.innerHTML = isDark ? '🌙 Dark' : '☀️ Light';
    });
    
    // ========== SCIENTIFIC ENGINE ==========
    let expression = "";
    let angleUnit = "RAD";
    let engMode = false;
    let history = [];
    let currentActiveMode = "calc";
    
    function evaluateExpression(){
        if(expression.trim() === ""){ document.getElementById("resultValue").innerText = "0"; document.getElementById("errorMsg").innerText = ""; return; }
        try{
            let expr = expression.replace(/\^/g, '**');
            let res = Function('"use strict"; return (' + expr + ')')();
            if(engMode && Math.abs(res) >= 1000){
                if(res >= 1e12) res = (res/1e12).toFixed(6)+" T";
                else if(res >= 1e9) res = (res/1e9).toFixed(6)+" G";
                else if(res >= 1e6) res = (res/1e6).toFixed(6)+" M";
                else if(res >= 1e3) res = (res/1e3).toFixed(6)+" k";
                else if(res <= 1e-12) res = (res*1e12).toFixed(6)+" p";
                else if(res <= 1e-9) res = (res*1e9).toFixed(6)+" n";
                else if(res <= 1e-6) res = (res*1e6).toFixed(6)+" µ";
                else if(res <= 1e-3) res = (res*1e3).toFixed(6)+" m";
                else res = res.toFixed(10).replace(/\.?0+$/, '');
                document.getElementById("resultValue").innerText = res;
            } else {
                let disp = res.toFixed(10).replace(/\.?0+$/, '');
                document.getElementById("resultValue").innerText = disp;
            }
            document.getElementById("errorMsg").innerText = "";
        } catch(e){ document.getElementById("resultValue").innerText = "?"; document.getElementById("errorMsg").innerText = `⚠️ ${e.message}`; }
    }
    
    function addToHistory(){
        if(expression.trim() === "") return;
        let result = document.getElementById("resultValue").innerText;
        history.unshift({ expr: expression, result: result, time: new Date().toLocaleTimeString() });
        if(history.length > 20) history.pop();
        renderHistory();
    }
    
    function renderHistory(){
        let container = document.getElementById("historyList");
        if(history.length === 0){
            container.innerHTML = '<div style="color:var(--text-secondary); text-align:center; padding:20px;">No history yet<br>Click = to save</div>';
            return;
        }
        container.innerHTML = history.map((item, idx) => `
            <div class="history-item" onclick="recallHistory(${idx})">
                <div class="history-expr">${escapeHtml(item.expr)}</div>
                <div class="history-result">= ${escapeHtml(item.result)}</div>
                <div style="font-size:0.6rem; color:var(--text-secondary);">${item.time}</div>
            </div>
        `).join('');
    }
    
    window.recallHistory = function(idx){
        if(currentActiveMode !== "calc"){
            alert("Switch to Calculate mode to use history");
            return;
        }
        expression = history[idx].expr;
        document.getElementById("currentExpr").innerText = expression || "0";
        evaluateExpression();
    };
    
    function escapeHtml(str){ return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    
    function appendToExpr(txt){ expression += txt; document.getElementById("currentExpr").innerText = expression || "0"; evaluateExpression(); }
    function handleAction(action){
        if(action === "clear") expression = "";
        else if(action === "back") expression = expression.slice(0,-1);
        else if(action === "neg") expression = (expression.startsWith("-")?expression.slice(1):"-"+expression);
        else if(action === "left") appendToExpr("(");
        else if(action === "right") appendToExpr(")");
        else if(action === "comma") appendToExpr(",");
        else if(action === "space") appendToExpr(" ");
        else if(action === "eval") { addToHistory(); evaluateExpression(); }
        else if(action === "pi") appendToExpr("Math.PI");
        else if(action === "e") appendToExpr("Math.E");
        else if(action === "power") appendToExpr("^");
        else if(action === "frac") appendToExpr("frac(");
        else if(action === "help") alert("Scientific: sin,cos,tan,asin,acos,atan,sqrt,cbrt,ln,log10,abs,^,frac(num,den)");
        else if(["sin","cos","tan","asin","acos","atan","sqrt","cbrt","ln","log10","abs"].includes(action)) appendToExpr(action+"(");
        else appendToExpr(action);
        document.getElementById("currentExpr").innerText = expression || "0";
        evaluateExpression();
    }
    
    // ========== UNIT CONVERTER ==========
    const unitData = {
        length: { meter:1, cm:0.01, mm:0.001, km:1000, inch:0.0254, foot:0.3048, mile:1609.34 },
        mass: { gram:1, kg:1000, mg:0.001, pound:453.592, ounce:28.3495 },
        temperature: { celsius:1, fahrenheit: (v)=> (v*9/5+32), kelvin: (v)=> v+273.15, reverse: { celsius: (v)=>v, fahrenheit:(v)=>(v-32)*5/9, kelvin:(v)=>v-273.15 } }
    };
    function populateUnits(){
        let type = document.getElementById("unitType").value;
        let fromSel = document.getElementById("fromUnit");
        let toSel = document.getElementById("toUnit");
        if(type==="temperature"){
            let units = ["celsius","fahrenheit","kelvin"];
            fromSel.innerHTML = units.map(u=>`<option value="${u}">${u}</option>`).join('');
            toSel.innerHTML = units.map(u=>`<option value="${u}">${u}</option>`).join('');
        } else {
            let units = Object.keys(unitData[type]);
            fromSel.innerHTML = units.map(u=>`<option value="${u}">${u}</option>`).join('');
            toSel.innerHTML = units.map(u=>`<option value="${u}">${u}</option>`).join('');
        }
    }
    function convertUnits(){
        let type = document.getElementById("unitType").value;
        let val = parseFloat(document.getElementById("unitValue").value);
        let from = document.getElementById("fromUnit").value;
        let to = document.getElementById("toUnit").value;
        if(isNaN(val)){ document.getElementById("unitResult").innerHTML = "Invalid number"; return; }
        let result;
        if(type==="temperature"){
            let celsius = (from==="celsius"?val : from==="fahrenheit"? (val-32)*5/9 : val-273.15);
            result = (to==="celsius"?celsius : to==="fahrenheit"? celsius*9/5+32 : celsius+273.15);
        } else {
            let inBase = val * unitData[type][from];
            result = inBase / unitData[type][to];
        }
        document.getElementById("unitResult").innerHTML = `${val} ${from} = ${result.toFixed(6)} ${to}`;
    }
    
    // ========== MATRIX MODE ==========
    function renderMatrixUI(){
        return `<div class="section-title">📊 MATRIX OPERATIONS</div>
            <div class="input-group"><span>Number of matrices:</span><input type="number" id="numMatrices" class="input-field" value="2" min="1" max="4" style="width:80px"><button class="action-btn" id="createMatricesBtn">Create</button></div>
            <div id="matricesContainer"></div>
            <div class="input-group"><select id="opMatrix1" class="select-field"></select><select id="matrixOp" class="select-field"><option value="add">+</option><option value="sub">-</option><option value="mul">×</option></select><select id="opMatrix2" class="select-field"></select><button class="action-btn" id="matrixOpBtn">Calculate</button><button class="action-btn" id="matrixDetBtn">Determinant</button></div>
            <div id="matrixResult" class="data-item">Result will appear here</div>`;
    }
    
    function attachMatrixEvents(){
        document.getElementById("createMatricesBtn")?.addEventListener("click", () => {
            let num = parseInt(document.getElementById("numMatrices").value);
            let container = document.getElementById("matricesContainer");
            container.innerHTML = "";
            let select1 = document.getElementById("opMatrix1");
            let select2 = document.getElementById("opMatrix2");
            select1.innerHTML = ""; select2.innerHTML = "";
            for(let m=0; m<num; m++){
                let card = document.createElement("div");
                card.className = "matrix-card";
                card.innerHTML = `<div><strong>Matrix ${String.fromCharCode(65+m)}</strong> Rows:<input type="number" id="rows_${m}" class="input-field" value="2" min="1" max="3" style="width:60px"> Cols:<input type="number" id="cols_${m}" class="input-field" value="2" min="1" max="3" style="width:60px"> <button class="action-btn" id="build_${m}" style="padding:4px 12px;">Set</button></div>
                    <div id="matrix_${m}_inputs"></div>`;
                container.appendChild(card);
                select1.innerHTML += `<option value="${m}">Matrix ${String.fromCharCode(65+m)}</option>`;
                select2.innerHTML += `<option value="${m}">Matrix ${String.fromCharCode(65+m)}</option>`;
                document.getElementById(`build_${m}`)?.addEventListener("click", () => {
                    let rows = parseInt(document.getElementById(`rows_${m}`).value);
                    let cols = parseInt(document.getElementById(`cols_${m}`).value);
                    let html = `<div class="matrix-grid" style="grid-template-columns: repeat(${cols}, auto);">`;
                    for(let i=0;i<rows;i++) for(let j=0;j<cols;j++) html += `<input type="number" class="matrix-input" id="M${m}_${i}_${j}" placeholder="a${i+1}${j+1}" value="${i+j+1}" step="any">`;
                    html += `</div>`;
                    document.getElementById(`matrix_${m}_inputs`).innerHTML = html;
                });
                document.getElementById(`build_${m}`).click();
            }
        });
        document.getElementById("matrixOpBtn")?.addEventListener("click", () => {
            let idx1 = parseInt(document.getElementById("opMatrix1").value);
            let idx2 = parseInt(document.getElementById("opMatrix2").value);
            let op = document.getElementById("matrixOp").value;
            let rows1 = parseInt(document.getElementById(`rows_${idx1}`).value);
            let cols1 = parseInt(document.getElementById(`cols_${idx1}`).value);
            let rows2 = parseInt(document.getElementById(`rows_${idx2}`).value);
            let cols2 = parseInt(document.getElementById(`cols_${idx2}`).value);
            if(op !== "mul" && (rows1 !== rows2 || cols1 !== cols2)){ document.getElementById("matrixResult").innerHTML = "Error: Dimensions must match"; return; }
            if(op === "mul" && cols1 !== rows2){ document.getElementById("matrixResult").innerHTML = "Error: cols of A must equal rows of B"; return; }
            let A=[], B=[];
            for(let i=0;i<rows1;i++){ A[i]=[]; for(let j=0;j<cols1;j++) A[i][j]=parseFloat(document.getElementById(`M${idx1}_${i}_${j}`)?.value||0); }
            for(let i=0;i<rows2;i++){ B[i]=[]; for(let j=0;j<cols2;j++) B[i][j]=parseFloat(document.getElementById(`M${idx2}_${i}_${j}`)?.value||0); }
            let result;
            if(op === "add"){ result=[]; for(let i=0;i<rows1;i++){ result[i]=[]; for(let j=0;j<cols1;j++) result[i][j]=A[i][j]+B[i][j]; } }
            else if(op === "sub"){ result=[]; for(let i=0;i<rows1;i++){ result[i]=[]; for(let j=0;j<cols1;j++) result[i][j]=A[i][j]-B[i][j]; } }
            else { result=Array(rows1).fill().map(()=>Array(cols2).fill(0));
                for(let i=0;i<rows1;i++) for(let j=0;j<cols2;j++) for(let k=0;k<cols1;k++) result[i][j] += A[i][k]*B[k][j];
            }
            document.getElementById("matrixResult").innerHTML = `<strong>Result:</strong><br>${JSON.stringify(result)}`;
        });
        document.getElementById("matrixDetBtn")?.addEventListener("click", () => {
            let idx = parseInt(document.getElementById("opMatrix1").value);
            let rows = parseInt(document.getElementById(`rows_${idx}`).value);
            if(rows !== 2 && rows !== 3){ document.getElementById("matrixResult").innerHTML = "Determinant only for 2x2 or 3x3"; return; }
            let A=[];
            for(let i=0;i<rows;i++){ A[i]=[]; for(let j=0;j<rows;j++) A[i][j]=parseFloat(document.getElementById(`M${idx}_${i}_${j}`)?.value||0); }
            let det=0;
            if(rows===2) det = A[0][0]*A[1][1] - A[0][1]*A[1][0];
            else det = A[0][0]*(A[1][1]*A[2][2]-A[1][2]*A[2][1]) - A[0][1]*(A[1][0]*A[2][2]-A[1][2]*A[2][0]) + A[0][2]*(A[1][0]*A[2][1]-A[1][1]*A[2][0]);
            document.getElementById("matrixResult").innerHTML = `<strong>Determinant:</strong> ${det}`;
        });
        document.getElementById("createMatricesBtn")?.click();
    }

    function attachDistributionEvents(){
        function updateParams(){
            let type = document.getElementById("distType").value;
            let html = "";
            if(type === "npd") html = `<div class="input-group">x:<input id="dx" type="number" class="input-field" step="any"> μ:<input id="dmu" type="number" class="input-field" value="0"> σ:<input id="dsigma" type="number" class="input-field" value="1"></div>`;
            else if(type === "ncd") html = `<div class="input-group">Lower:<input id="dlow" type="number" class="input-field" step="any"> Upper:<input id="dhigh" type="number" class="input-field" step="any"> μ:<input id="dmu2" type="number" class="input-field" value="0"> σ:<input id="dsigma2" type="number" class="input-field" value="1"></div>`;
            else if(type === "bpd") html = `<div class="input-group">n:<input id="bn" type="number" class="input-field" step="1" min="0"> p:<input id="bp" type="number" class="input-field" step="any" min="0" max="1"> k:<input id="bk" type="number" class="input-field" step="1"></div>`;
            else if(type === "bcd") html = `<div class="input-group">n:<input id="bcn" type="number" class="input-field" step="1"> p:<input id="bcp" type="number" class="input-field" step="any"> k:<input id="bck" type="number" class="input-field" step="1"></div>`;
            else if(type === "ppd") html = `<div class="input-group">λ:<input id="plambda" type="number" class="input-field" step="any"> k:<input id="pk" type="number" class="input-field" step="1"></div>`;
            document.getElementById("distParams").innerHTML = html;
        }
        document.getElementById("distType")?.addEventListener("change", updateParams);
        document.getElementById("calcDist")?.addEventListener("click",()=>{
            let type = document.getElementById("distType").value;
            let result = "";
            if(type === "npd"){ let x=parseFloat(document.getElementById("dx")?.value||0), μ=parseFloat(document.getElementById("dmu")?.value||0), σ=parseFloat(document.getElementById("dsigma")?.value||1); let pdf = (1/(σ*Math.sqrt(2*Math.PI)))*Math.exp(-Math.pow(x-μ,2)/(2*σ*σ)); result = `PDF = ${pdf.toFixed(6)}`; }
            else if(type === "bpd"){ let n=parseInt(document.getElementById("bn")?.value||0), p=parseFloat(document.getElementById("bp")?.value||0), k=parseInt(document.getElementById("bk")?.value||0); let comb = (n,k)=>{ if(k<0||k>n) return 0; let r=1; for(let i=1;i<=k;i++) r=r*(n-k+i)/i; return r; }; let prob = comb(n,k) * Math.pow(p,k) * Math.pow(1-p,n-k); result = `P(X=${k}) = ${prob.toFixed(6)}`; }
            else if(type === "ppd"){ let λ=parseFloat(document.getElementById("plambda")?.value||0), k=parseInt(document.getElementById("pk")?.value||0); let fact = (n)=>n<=1?1:n*fact(n-1); let prob = Math.exp(-λ) * Math.pow(λ,k) / fact(k); result = `P(X=${k}) = ${prob.toFixed(6)}`; }
            else result = "CDF = Cumulative probability";
            document.getElementById("distResult").innerHTML = result;
        });
        updateParams();
    }

                        <div class="input-group">Eq2: <input type="number" id="s2a" class="input-field" placeholder="a" value="3" step="any">x + <input type="number" id="s2b" class="input-field" placeholder="b" value="2" step="any">y = <input type="number" id="s2c" class="input-field" placeholder="c" value="7" step="any"></div>`;

        document.getElementById("solveEq")?.addEventListener("click", () => {
            let type = document.getElementById("eqType").value;
            let result = "";
            if(type === "quad"){
                let a = parseFloat(document.getElementById("qa")?.value || 0);
                let b = parseFloat(document.getElementById("qb")?.value || 0);
                let c = parseFloat(document.getElementById("qc")?.value || 0);
                if(a === 0) result = "Not a quadratic equation (a = 0)";
                else {
                    let d = b*b - 4*a*c;
                    if(d < 0) result = `No real roots (Discriminant = ${d.toFixed(4)})`;
                    else {
                        let x1 = (-b + Math.sqrt(d)) / (2*a);
                        let x2 = (-b - Math.sqrt(d)) / (2*a);
                        result = `x₁ = ${x1.toFixed(6)}, x₂ = ${x2.toFixed(6)}`;
                    }
                }
            } else {
                let a1 = parseFloat(document.getElementById("s1a")?.value || 0);
                let b1 = parseFloat(document.getElementById("s1b")?.value || 0);
                let c1 = parseFloat(document.getElementById("s1c")?.value || 0);
                let a2 = parseFloat(document.getElementById("s2a")?.value || 0);
                let b2 = parseFloat(document.getElementById("s2b")?.value || 0);
                let c2 = parseFloat(document.getElementById("s2c")?.value || 0);
                let det = a1*b2 - a2*b1;
                if(det === 0) result = "No unique solution (determinant = 0)";
                else {
                    let x = (c1*b2 - c2*b1) / det;
                    let y = (a1*c2 - a2*c1) / det;
                    result = `x = ${x.toFixed(6)}, y = ${y.toFixed(6)}`;
                }
            }
            document.getElementById("equationResult").innerHTML = result;
        });
        updateEqParams();
    }

    function attachInequalityEvents(){
        document.getElementById("solveIneq")?.addEventListener("click", () => {
            let a = parseFloat(document.getElementById("iq_a")?.value || 0);
            let b = parseFloat(document.getElementById("iq_b")?.value || 0);
            let c = parseFloat(document.getElementById("iq_c")?.value || 0);
            let result = "";
            let d = b*b - 4*a*c;
            if(a > 0){
                if(d <= 0) result = "Solution: All real numbers (always positive except at vertex)";
                else {
                    let r1 = (-b - Math.sqrt(d)) / (2*a);
                    let r2 = (-b + Math.sqrt(d)) / (2*a);
                    let left = Math.min(r1, r2);
                    let right = Math.max(r1, r2);
                    result = `Solution: x < ${left.toFixed(4)} OR x > ${right.toFixed(4)}`;
                }
            } else if(a < 0){
                if(d <= 0) result = "No solution (parabola opens downward)";
                else {
                    let r1 = (-b - Math.sqrt(d)) / (2*a);
                    let r2 = (-b + Math.sqrt(d)) / (2*a);
                    let left = Math.min(r1, r2);
                    let right = Math.max(r1, r2);
                    result = `Solution: ${left.toFixed(4)} < x < ${right.toFixed(4)}`;
                }
            } else result = "Not a quadratic (a = 0)";
            document.getElementById("inequalityResult").innerHTML = result;
        });
    }

            try {
                if(fromBase === 16) decimalValue = parseInt(inputStr, 16);
                else if(fromBase === 2) decimalValue = parseInt(inputStr, 2);
                else if(fromBase === 8) decimalValue = parseInt(inputStr, 8);
                else decimalValue = parseInt(inputStr, 10);
                if(isNaN(decimalValue)) throw new Error();
                let result;
                if(toBase === 16) result = decimalValue.toString(16).toUpperCase();
                else if(toBase === 2) result = decimalValue.toString(2);
                else if(toBase === 8) result = decimalValue.toString(8);
                else result = decimalValue.toString(10);
                document.getElementById("baseRes").innerHTML = `${inputStr} (base ${fromBase}) = ${result} (base ${toBase})`;
            } catch(e) {
                document.getElementById("baseRes").innerHTML = "Invalid number for selected base";
            }
        });
        document.getElementById("showAllBases")?.addEventListener("click", () => {
            let inputStr = document.getElementById("baseInput").value;
            let fromBase = parseInt(document.getElementById("baseFromType").value);
            let decimalValue;
            try {
                if(fromBase === 16) decimalValue = parseInt(inputStr, 16);
                else if(fromBase === 2) decimalValue = parseInt(inputStr, 2);
                else if(fromBase === 8) decimalValue = parseInt(inputStr, 8);
                else decimalValue = parseInt(inputStr, 10);
                if(isNaN(decimalValue)) throw new Error();
                document.getElementById("baseRes").innerHTML = `
                    <strong>Decimal:</strong> ${decimalValue}<br>
                    <strong>Binary:</strong> ${decimalValue.toString(2)}<br>
                    <strong>Octal:</strong> ${decimalValue.toString(8)}<br>
                    <strong>Hexadecimal:</strong> ${decimalValue.toString(16).toUpperCase()}
                `;
            } catch(e) {
                document.getElementById("baseRes").innerHTML = "Invalid number";
            }
        });
    }
    
    // ========== ANGLE & ENGINEER MODES ==========
    function renderAngleUI(){
        return `<div class="section-title">📐 ANGLE UNIT</div>
            <div class="input-group"><button class="action-btn" id="setRad">Radian</button><button class="action-btn" id="setDeg">Degree</button><button class="action-btn" id="setGrad">Gradian</button></div>
            <div id="angStatus" class="data-item">Current: ${angleUnit}</div>`;
    }
    
    function renderEngineerUI(){
        return `<div class="section-title">⚡ ENGINEER SYMBOL</div>
            <button class="action-btn" id="toggleEngBtn">Toggle: ${engMode ? "ON" : "OFF"}</button>
            <div class="data-item">k(10³), M(10⁶), G(10⁹), m(10⁻³), µ(10⁻⁶), n(10⁻⁹), p(10⁻¹²)</div>
            <div class="data-item">Current mode: ${engMode ? "Engineer symbols ON" : "Normal display"}</div>`;
    }
    
    function attachAngleEvents(){
        document.getElementById("setRad")?.addEventListener("click",()=>{ angleUnit="RAD"; document.getElementById("angStatus").innerHTML = "Current: RADIAN"; });
        document.getElementById("setDeg")?.addEventListener("click",()=>{ angleUnit="DEG"; document.getElementById("angStatus").innerHTML = "Current: DEGREE"; });
        document.getElementById("setGrad")?.addEventListener("click",()=>{ angleUnit="GRAD"; document.getElementById("angStatus").innerHTML = "Current: GRADIAN"; });
    }
    
    // ========== MODE SWITCHING ==========
    function enableCalculator(enable){
        let calcButtons = document.getElementById("calcButtons");
        if(enable) calcButtons.classList.remove("disabled-calc");
        else calcButtons.classList.add("disabled-calc");
    }
    
    function renderCurrentMode(mode){
        currentActiveMode = mode;
        let html = "";
        
        if(mode === "calc"){
            enableCalculator(true);
            html = `<div class="section-title">✅ SCIENTIFIC CALCULATOR</div>
                    <div class="data-item">• Use ^ for power (5^4=625)</div>
                    <div class="data-item">• frac(num,den) for fractions</div>
                    <div class="data-item">• sin/cos/tan with DEG/RAD/GRAD</div>
                    <div class="data-item">• Click = to save to history</div>`;
            document.getElementById("dynamicContent").innerHTML = html;
            return;
        }
        
        enableCalculator(false);
        
        if(mode === "matrix") html = renderMatrixUI();
        else if(mode === "vector") html = renderVectorUI();
        else if(mode === "stats") html = renderStatsUI();
        else if(mode === "dist") html = renderDistributionUI();
        else if(mode === "table") html = renderTableUI();
        else if(mode === "equation") html = renderEquationUI();
        else if(mode === "inequality") html = renderInequalityUI();
        else if(mode === "ratio") html = renderRatioUI();
        else if(mode === "complex") html = renderComplexUI();
        else if(mode === "base") html = renderBaseUI();
        else if(mode === "angle") html = renderAngleUI();
        else if(mode === "eng") html = renderEngineerUI();
        
        document.getElementById("dynamicContent").innerHTML = html;
        
        if(mode === "matrix") attachMatrixEvents();
        else if(mode === "vector") attachVectorEvents();
        else if(mode === "stats") attachStatsEvents();
        else if(mode === "dist") attachDistributionEvents();
        else if(mode === "table") attachTableEvents();
        else if(mode === "equation") attachEquationEvents();
        else if(mode === "inequality") attachInequalityEvents();
        else if(mode === "ratio") attachRatioEvents();
        else if(mode === "complex") attachComplexEvents();
        else if(mode === "base") attachBaseEvents();
        else if(mode === "angle") attachAngleEvents();
        else if(mode === "eng"){
            document.getElementById("toggleEngBtn")?.addEventListener("click",()=>{ engMode = !engMode; renderCurrentMode("eng"); });
        }
    }
    
    document.querySelectorAll(".mode-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            renderCurrentMode(btn.getAttribute("data-mode"));
        });
    });
    
    document.querySelectorAll(".calc-panel button").forEach(btn => {
        btn.addEventListener("click", () => {
            if(currentActiveMode !== "calc"){
                alert("Please switch to Calculate mode first");
                return;
            }
            let tok = btn.getAttribute("data-token");
            let func = btn.getAttribute("data-func");
            if(tok){ let r=tok; if(tok==="÷") r="/"; if(tok==="×") r="*"; if(tok==="−") r="-"; appendToExpr(r); }
            else if(func) handleAction(func);
            else if(btn.innerText==="=") handleAction("eval");
        });
    });
    
    document.getElementById("clearHistoryBtn")?.addEventListener("click", () => { history = []; renderHistory(); });
    document.getElementById("unitType")?.addEventListener("change", populateUnits);
    document.getElementById("doConvert")?.addEventListener("click", convertUnits);
    
    window.addEventListener("keydown", (e)=>{
        if(currentActiveMode !== "calc") return;
        if(e.key==="Enter"){ e.preventDefault(); handleAction("eval"); }
        else if(e.key==="Backspace"){ e.preventDefault(); handleAction("back"); }
        else if(e.key==="Escape"){ e.preventDefault(); handleAction("clear"); }
        else if(/^[\d+\-*/() .,]$/.test(e.key)){ e.preventDefault(); appendToExpr(e.key); }
        else if(e.key === "^"){ e.preventDefault(); appendToExpr("^"); }
    });
    
    populateUnits();
    renderCurrentMode("calc");
    document.getElementById("currentExpr").innerText = "0";
</script>
</body>
</html>
